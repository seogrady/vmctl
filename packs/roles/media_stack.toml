name = "media_stack"
kind = "vm"

[defaults]
requires = ["docker"]

[features.media_services]
enabled = true
minimal = true
jellyfin_base_url = ""
sonarr_base_url = ""
radarr_base_url = ""
prowlarr_base_url = ""
qbittorrent_base_url = "/"
services = [
  "caddy",
  "gluetun",
  "jellyfin",
  "sonarr",
  "radarr",
  "prowlarr",
  "qbittorrent-vpn",
  "jellyseerr",
  "bazarr",
  "homarr",
  "jellystat-db",
  "jellystat",
]

[features.storage]
media_path = "/media"

[features.vpn]
enabled = false
provider = "mullvad"
type = "wireguard"

[render]
templates = ["docker-compose.media.hbs", "media.env.hbs", "caddyfile.media.hbs", "media-index.html.hbs", "tailscale-setup.sh.hbs"]

[scripts]
bootstrap = ["bootstrap-node.sh", "bootstrap-tailscale.sh", "bootstrap-media.sh", "bootstrap-homarr.sh", "bootstrap-jellyfin.sh", "bootstrap-jellystat.sh", "bootstrap-qbittorrent.sh", "bootstrap-arr.sh", "bootstrap-jellyseerr.sh", "bootstrap-ui-routing.sh"]
