name = "media_stack"
kind = "vm"

[defaults]
requires = ["docker"]

[features.media_services]
enabled = true
minimal = true
services = [
  "caddy",
  "gluetun",
  "jellyfin",
  "meilisearch",
  "jellysearch",
  "sonarr",
  "radarr",
  "prowlarr",
  "qbittorrent-vpn",
  "jellyseerr",
  "bazarr",
  "jellystat-db",
  "jellystat",
]

[features.storage]
media_path = "/media"

[features.vpn]
enabled = false
provider = "mullvad"
type = "wireguard"

[render]
templates = ["docker-compose.media.hbs", "media.env.hbs", "caddyfile.media.hbs", "media-index.html.hbs", "tailscale-setup.sh.hbs"]

[scripts]
bootstrap = [
  "bootstrap-node.sh",
  "bootstrap-tailscale.sh",
  "bootstrap-media.sh",
  "bootstrap-ui-routing.sh",
  "bootstrap-jellyfin.sh",
  "bootstrap-jellysearch.sh",
  "bootstrap-jellyfin-plugins.sh",
  "bootstrap-jellyseerr.sh",
  "bootstrap-streamyfin.sh",
  "bootstrap-jellio.sh",
  "bootstrap-jellystat.sh",
  "bootstrap-qbittorrent.sh",
  "bootstrap-arr.sh",
  "bootstrap-validate-streaming-stack.sh",
]
