name = "jellyseerr"
container_type = "docker"

[image]
name = "ghcr.io/seerr-team/seerr"
tag = "v3.2.0"

[settings]
init = true

[ports]
published = ["5055:5055"]

[volumes]
mounts = ["${CONFIG_PATH}/jellyseerr:/app/config"]

[environment]
API_KEY = "${JELLYSEERR_API_KEY}"

[ui]
enabled = true
port = 5056
path = "/"
name = "Jellyseerr"
description = "Request management (no-login LAN/Tailscale endpoint)"
