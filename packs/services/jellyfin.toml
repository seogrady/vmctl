name = "jellyfin"
container_type = "docker"

[image]
name = "lscr.io/linuxserver/jellyfin"
tag = "latest"

[settings]
network_mode = "host"

[volumes]
mounts = ["${MEDIA_PATH}:/media", "${CONFIG_PATH}/jellyfin:/config"]

[ui]
enabled = true
port = 8097
path = "/"
name = "Jellyfin"
description = "Media server (no-login LAN/Tailscale endpoint)"
