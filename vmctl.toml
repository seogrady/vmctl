# Copy to `vmctl.toml` for local overrides.
version = "2.0.0"

[backend]
kind = "tofu"

[backend.proxmox]
endpoint = "https://mini:8006/api2/json"
node = "mini"
auth = "token"
token_id = "${PROXMOX_TOKEN_ID}"
token_secret = "${PROXMOX_TOKEN_SECRET}"
tls_insecure = true

[sources]
local = ["./resources", "./services"]
git = []

[defaults]
bridge = "${bridge}"
storage = "local-lvm"
nameserver = "1.1.1.1"
start_on_boot = true
agent = true
tags = ["vmctl", "homelab"]

[defaults.runtime]
engine = "docker"

[defaults.cloud_init]
ssh_key_file = "${DEFAULT_SSH_KEY_FILE}"

[defaults.provision]
user = "ubuntu"
private_key_file = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
retries = 20
retry_delay_seconds = 15

[const]
bridge = "vmbr0"
tailscale_gateway = "tailscale-gateway"
media_stack = "media-stack"
gitea = "gitea"
default_tailnet_tag = "tag:homelab"

[env]
PROXMOX_TOKEN_ID = "${PROXMOX_TOKEN_ID}"
PROXMOX_TOKEN_SECRET = "${PROXMOX_TOKEN_SECRET}"
TAILSCALE_AUTH_KEY = "${TAILSCALE_AUTH_KEY}"
DEFAULT_SSH_KEY_FILE = "${DEFAULT_SSH_KEY_FILE}"
DEFAULT_SSH_PRIVATE_KEY_FILE = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
GITEA_ADMIN_USER = "admin"
GITEA_ADMIN_PASSWORD = "changeme"
GITEA_ADMIN_EMAIL = "admin@gitea.local"
GITEA_BASE_URL = "http://gitea:3000/"
GITEA_SSH_HOST = "gitea"
GITEA_BOOTSTRAP_REPO_NAME = "vmctl"
GITEA_BOOTSTRAP_REPO_PRIVATE = "true"
GITEA_BOOTSTRAP_SECRETS_ENABLED = "true"
GITEA_BOOTSTRAP_SECRET_PROXMOX_TOKEN_ID = "${PROXMOX_TOKEN_ID}"
GITEA_BOOTSTRAP_SECRET_PROXMOX_TOKEN_SECRET = "${PROXMOX_TOKEN_SECRET}"
GITEA_BOOTSTRAP_SECRET_TAILSCALE_AUTH_KEY = "${TAILSCALE_AUTH_KEY}"
GITEA_BOOTSTRAP_SECRET_DEFAULT_SSH_PRIVATE_KEY = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
GITEA_BOOTSTRAP_SECRET_DEFAULT_SSH_PUBLIC_KEY = "${DEFAULT_SSH_KEY_FILE}"

[images.debian_12_lxc]
kind = "lxc"
source = "pveam"
node = "mini"
storage = "local"
content_type = "vztmpl"
template = "debian-12-standard_12.12-1_amd64.tar.zst"
file_name = "debian-12-standard_12.12-1_amd64.tar.zst"

[images.ubuntu_24_cloud_image]
kind = "vm"
source = "url"
node = "mini"
storage = "local"
content_type = "import"
file_name = "noble-server-cloudimg-amd64.qcow2"
url = "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
