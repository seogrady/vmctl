# Copy to `vmctl.toml` for local overrides.

[backend]
kind = "tofu"

[backend.proxmox]
endpoint = "https://mini:8006/api2/json"
node = "mini"
auth = "token"
token_id = "${PROXMOX_TOKEN_ID}"
token_secret = "${PROXMOX_TOKEN_SECRET}"
tls_insecure = true

[defaults]
bridge = "${bridge}"
storage = "local-lvm"
nameserver = "1.1.1.1"
start_on_boot = true
agent = true
tags = ["vmctl", "homelab"]

[defaults.cloud_init]
ssh_key_file = "${DEFAULT_SSH_KEY_FILE}"

[defaults.provision]
user = "ubuntu"
private_key_file = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
retries = 20
retry_delay_seconds = 15

[const]
bridge = "vmbr0"
tailscale_gateway = "tailscale-gateway"
media_stack = "media-stack"
default_tailnet_tag = "tag:homelab"

[env]
PROXMOX_TOKEN_ID = "${PROXMOX_TOKEN_ID}"
PROXMOX_TOKEN_SECRET = "${PROXMOX_TOKEN_SECRET}"
TAILSCALE_AUTH_KEY = "${TAILSCALE_AUTH_KEY}"
DEFAULT_SSH_KEY_FILE = "${DEFAULT_SSH_KEY_FILE}"
DEFAULT_SSH_PRIVATE_KEY_FILE = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
JELLYFIN_ADMIN_USER = "admin"
JELLYFIN_ADMIN_PASSWORD = "${JELLYFIN_ADMIN_PASSWORD}"
SEERR_API_KEY = ""
CLOUDFLARED_TOKEN = ""
SABNZBD_API_KEY = ""
SABNZBD_USERNAME = ""
SABNZBD_PASSWORD = ""
SABNZBD_SERVER_NAME = ""
SABNZBD_SERVER_DISPLAY_NAME = ""
SABNZBD_SERVER_HOST = ""
SABNZBD_SERVER_PORT = "563"
SABNZBD_SERVER_USERNAME = ""
SABNZBD_SERVER_PASSWORD = ""
SABNZBD_SERVER_CONNECTIONS = "10"
SABNZBD_SERVER_TIMEOUT = "120"
SABNZBD_SERVER_RETENTION = "0"
SABNZBD_SERVER_SSL = "true"
SABNZBD_SERVER_ENABLE = ""
SONARR_DEFAULT_QUALITY_PROFILE = "WEB-1080p"
RADARR_DEFAULT_QUALITY_PROFILE = "HD Bluray + WEB"
CLOUDFLARE_PUBLIC_BASE_URL = ""
WIREGUARD_PRIVATE_KEY = ""
WIREGUARD_ADDRESSES = ""
VPN_SERVER_CITIES = ""

[images.debian_12_lxc]
kind = "lxc"
source = "pveam"
node = "mini"
storage = "local"
content_type = "vztmpl"
template = "debian-12-standard_12.12-1_amd64.tar.zst"
file_name = "debian-12-standard_12.12-1_amd64.tar.zst"

[images.ubuntu_24_cloud_image]
kind = "vm"
source = "url"
node = "mini"
storage = "local"
content_type = "import"
file_name = "noble-server-cloudimg-amd64.qcow2"
url = "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"

[[resources]]
name = "tailscale-gateway"
kind = "lxc"
image = "debian_12_lxc"
role = "tailscale_gateway"
vmid = 101
rootfs_gb = 8
memory = 1024
cores = 1
description = "Tailscale subnet router managed by vmctl"

[resources.network]
mode = "dhcp"

[resources.provision]
user = "root"
private_key_file = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"
retries = 20
retry_delay_seconds = 15

[resources.features.lxc]
nesting = true

[resources.features.tailscale]
enabled = true
mode = "router"
auth_key = "${TAILSCALE_AUTH_KEY}"
advertise_routes = ["192.168.86.0/24"]
exit_node = false
tags = ["${default_tailnet_tag}"]

[[resources]]
name = "${media_stack}"
kind = "vm"
image = "ubuntu_24_cloud_image"
role = "media_stack"
vmid = 210
cores = 6
memory = 8192
disk_gb = 64
disk_interface = "scsi0"
scsi_hardware = "virtio-scsi-single"
iothread = false
description = "Media stack VM managed by vmctl"
depends_on = ["${tailscale_gateway}"]

[resources.network]
mode = "dhcp"

[resources.cloud_init]
user = "ubuntu"
ssh_key_file = "${DEFAULT_SSH_KEY_FILE}"

[resources.provision]
user = "ubuntu"
private_key_file = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"

[resources.features.docker]
enabled = true

[resources.features.tailscale]
enabled = true
mode = "client"
auth_key = "${TAILSCALE_AUTH_KEY}"
tags = ["${default_tailnet_tag}"]

[resources.features.media_services]
enabled = true
minimal = true
services = ["caddy", "gluetun", "jellio-shim", "jellyfin", "meilisearch", "jellysearch", "recyclarr", "sabnzbd", "sonarr", "radarr", "prowlarr", "qbittorrent-vpn", "seerr", "bazarr", "jellystat-db", "jellystat"]
jellyfin_url = "http://${media_stack}:8096"
jellyfin_admin_user = "${JELLYFIN_ADMIN_USER}"
jellyfin_admin_password = "${JELLYFIN_ADMIN_PASSWORD}"
ui_homepage_enabled = true
ui_homepage_title = "Media Stack"

[resources.features.media_services.exposure]
tailscale_https_enabled = true
tailscale_https_target = "http://127.0.0.1:80"

[resources.features.storage]
# Mount a NAS or external volume here later; containers still see it as /data.
path = "/data"

[resources.features.vpn]
enabled = true
provider = "mullvad"
type = "wireguard"
wireguard_private_key = "${WIREGUARD_PRIVATE_KEY}"
wireguard_addresses = "${WIREGUARD_ADDRESSES}"
server_cities = "${VPN_SERVER_CITIES}"

[[resources]]
name = "kodi-htpc"
kind = "vm"
image = "ubuntu_24_cloud_image"
role = "kodi_htpc"
vmid = 211
cores = 4
memory = 4096
disk_gb = 32
disk_interface = "scsi0"
scsi_hardware = "virtio-scsi-single"
iothread = false
description = "Kodi living room HTPC VM managed by vmctl"
depends_on = []

[resources.network]
mode = "dhcp"

[resources.cloud_init]
user = "ubuntu"
ssh_key_file = "${DEFAULT_SSH_KEY_FILE}"

[resources.provision]
user = "ubuntu"
private_key_file = "${DEFAULT_SSH_PRIVATE_KEY_FILE}"

[resources.features.tailscale]
enabled = true
mode = "client"
auth_key = "${TAILSCALE_AUTH_KEY}"
tags = ["${default_tailnet_tag}"]

[resources.features.intel_igpu]
enabled = true
# The HTPC owns the HDMI-capable GPU for real living room output.
mapping = "intel-igpu"
pci_device = "00:02.0"

[resources.features.htpc]
enabled = true
autostart = true
cec = true

[resources.features.remote]
enabled = true
web_port = 8080
event_server_port = 9777
tailscale_https_enabled = true
tailscale_https_target = "http://127.0.0.1:8080"

[resources.features.jellyfin]
enabled = true
server_url = "http://${media_stack}/jf"
username = "${JELLYFIN_ADMIN_USER}"
password = "${JELLYFIN_ADMIN_PASSWORD}"
