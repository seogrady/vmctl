name: Apply (vmctl)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: vmctl-apply-main
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ github.event_name == 'push' || github.event.pull_request.merged == true }}
    runs-on: vmctl
    steps:
      - name: Checkout (git)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git init -q .
          git remote add origin "$REPO_URL"
          git -c http.extraHeader="Authorization: token ${GITHUB_TOKEN}" fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout -q --detach FETCH_HEAD

      - name: Prepare SSH key files
        env:
          DEFAULT_SSH_PRIVATE_KEY: ${{ secrets.DEFAULT_SSH_PRIVATE_KEY }}
          DEFAULT_SSH_PUBLIC_KEY: ${{ secrets.DEFAULT_SSH_PUBLIC_KEY }}
        run: |
          install -d -m 0700 /root/.ssh
          printf '%s\n' "$DEFAULT_SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          printf '%s\n' "$DEFAULT_SSH_PUBLIC_KEY" > /root/.ssh/id_ed25519.pub
          chmod 0600 /root/.ssh/id_ed25519

      - name: Apply On Proxmox Host
        env:
          PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
          PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          VMCTL_HOST: 100.92.58.15
        run: |
          set -euo pipefail
          tar -czf /tmp/vmctl-src.tgz .
          scp -i /root/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            /tmp/vmctl-src.tgz "root@${VMCTL_HOST}:/tmp/vmctl-src.tgz"
          ssh -i /root/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "root@${VMCTL_HOST}" "\
              set -euo pipefail; \
              rm -rf /tmp/vmctl-ci && mkdir -p /tmp/vmctl-ci; \
              tar -xzf /tmp/vmctl-src.tgz -C /tmp/vmctl-ci; \
              cd /tmp/vmctl-ci; \
              export PROXMOX_TOKEN_ID='${PROXMOX_TOKEN_ID}'; \
              export PROXMOX_TOKEN_SECRET='${PROXMOX_TOKEN_SECRET}'; \
              export TAILSCALE_AUTH_KEY='${TAILSCALE_AUTH_KEY}'; \
              export DEFAULT_SSH_KEY_FILE='/root/.ssh/id_ed25519.pub'; \
              export DEFAULT_SSH_PRIVATE_KEY_FILE='/root/.ssh/id_ed25519'; \
              export TF_VAR_proxmox_api_token='${PROXMOX_TOKEN_ID}=${PROXMOX_TOKEN_SECRET}'; \
              cargo run -q -p vmctl -- apply --no-image-ensure; \
            "

      - name: Collect debug artifacts
        if: failure()
        run: |
          mkdir -p /tmp/vmctl-debug
          cp -f vmctl.lock /tmp/vmctl-debug/vmctl.lock 2>/dev/null || true
          cp -rf backend/generated/workspace /tmp/vmctl-debug/workspace 2>/dev/null || true
          tar -czf /tmp/vmctl-debug.tar.gz -C /tmp vmctl-debug

      - name: Print debug artifact path
        if: failure()
        run: |
          ls -lh /tmp/vmctl-debug.tar.gz || true
