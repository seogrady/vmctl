name = "jellysearch"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime", "meilisearch"]
optional = []

[runtime]
requirements = ["compose-service"]
services = ["jellysearch"]

[hooks]
bootstrap = "scripts/bootstrap-jellysearch.sh"

[container]
container_type = "docker"

[image]
name = "domistyle/jellysearch"
tag = "latest"

[ports]
published = ["5000:5000"]

[volumes]
mounts = ["${CONFIG_PATH}/jellyfin:/config:ro"]

[env]
MEILI_URL = "http://meilisearch:7700"
MEILI_MASTER_KEY = "${MEILI_MASTER_KEY}"
JELLYFIN_URL = "${JELLYFIN_INTERNAL_URL}"
JELLYFIN_CONFIG_DIR = "/config"
INDEX_CRON = "0 0/5 * ? * * *"
