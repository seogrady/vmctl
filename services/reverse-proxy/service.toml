name = "reverse-proxy"
version = "1.0.0"
scope = "resource"
targets = ["vm", "lxc"]

[inputs]
schema = [
  { key = "http_port", type = "u16", default = 80 },
  { key = "https_enabled", type = "bool", default = true },
]

[dependencies]
requires = ["container-runtime"]
optional = []

[runtime]
requirements = ["compose-network"]
services = ["caddy"]
