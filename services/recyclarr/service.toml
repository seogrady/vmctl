name = "recyclarr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime", "sonarr", "radarr"]
optional = []

[runtime]
requirements = ["compose-service"]
services = ["recyclarr"]

[scripts]
provision = "scripts/bootstrap-recyclarr.sh"

[container]
container_type = "docker"

[image]
name = "ghcr.io/recyclarr/recyclarr"
tag = "latest"

[volumes]
mounts = ["${CONFIG_PATH}/recyclarr:/config"]

[settings]
entrypoint = "/bin/sh"
command = "/config/recyclarr-loop.sh"
