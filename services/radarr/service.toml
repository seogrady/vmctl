name = "radarr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime", "prowlarr"]
optional = ["qbittorrent-vpn", "sabnzbd", "recyclarr"]

[runtime]
requirements = ["compose-service", "media-storage"]
services = ["radarr"]

[container]
container_type = "docker"

[image]
name = "lscr.io/linuxserver/radarr"
tag = "latest"

[ports]
published = ["7878:7878"]

[volumes]
mounts = ["${STORAGE_PATH}:/data", "${CONFIG_PATH}/radarr:/config"]

[ui]
enabled = true
port = 7878
path = "/"
name = "Radarr"
description = "Movie automation"
