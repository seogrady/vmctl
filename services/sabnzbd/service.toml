name = "sabnzbd"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime"]
optional = []

[runtime]
requirements = ["compose-service", "media-storage"]
services = ["sabnzbd"]

[scripts]
provision = "scripts/bootstrap-sabnzbd.sh"

[container]
container_type = "docker"
download_type = "usenet"

[image]
name = "lscr.io/linuxserver/sabnzbd"
tag = "latest"

[ports]
published = ["8085:8080"]

[volumes]
mounts = ["${STORAGE_PATH}:/data", "${CONFIG_PATH}/sabnzbd:/config"]

[ui]
enabled = true
port = 8085
path = "/"
name = "SABnzbd"
description = "Usenet downloader"
