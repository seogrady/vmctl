name = "jellyfin"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[inputs]
schema = [
  { key = "base_url", type = "string", default = "/jf" },
  { key = "http_port", type = "u16", default = 8096 },
  { key = "enable_hwaccel", type = "bool", default = true },
  { key = "hwaccel_device", type = "string", default = "/dev/dri/renderD128" },
  { key = "tonemap_mode", type = "string", default = "auto", allowed = ["auto", "force_on", "force_off"] },
]

[dependencies]
requires = ["container-runtime", "reverse-proxy"]
optional = ["jellysearch", "jellystat"]

[runtime]
requirements = ["dev-dri", "vaapi", "compose-service"]
services = ["jellyfin"]

[scripts]
provision = [
  "scripts/bootstrap-jellyfin.sh",
  "scripts/bootstrap-jellyfin-plugins.sh",
  "scripts/bootstrap-streamyfin.sh",
]
validate = "scripts/bootstrap-validate-streaming-stack.sh"

[container]
container_type = "docker"
group_add = ["992"]
devices = ["/dev/dri:/dev/dri"]

[image]
name = "lscr.io/linuxserver/jellyfin"
tag = "latest"

[settings]
network_mode = "host"

[volumes]
mounts = [
  "${STORAGE_PATH}:/data",
  "${CONFIG_PATH}/jellyfin:/config",
  "/etc/OpenCL/vendors:/etc/OpenCL/vendors:ro",
  "/usr/lib/x86_64-linux-gnu/intel-opencl:/usr/lib/x86_64-linux-gnu/intel-opencl:ro",
  "/usr/lib/x86_64-linux-gnu/libocloc_legacy1.so:/usr/lib/x86_64-linux-gnu/libocloc_legacy1.so:ro",
  "/lib/x86_64-linux-gnu/libigdgmm.so.12:/lib/x86_64-linux-gnu/libigdgmm.so.12:ro",
  "/usr/local/lib:/usr/local/lib:ro",
]

[ui]
enabled = true
port = 8097
path = "/"
name = "Jellyfin"
description = "Media server (no-login LAN/Tailscale endpoint)"
