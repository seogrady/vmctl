name = "flaresolverr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime"]
optional = []

[runtime]
requirements = ["compose-service"]
services = ["flaresolverr"]

[hooks]
bootstrap = "scripts/bootstrap-flaresolverr.sh"

[container]
container_type = "docker"

[image]
name = "ghcr.io/flaresolverr/flaresolverr"
tag = "v3.4.6"

[env]
LOG_LEVEL = "info"
TZ = "${TZ}"
