name = "seerr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime", "jellyfin", "sonarr", "radarr"]
optional = []

[runtime]
requirements = ["compose-service"]
services = ["seerr"]

[scripts]
provision = "scripts/bootstrap-seerr.sh"

[container]
container_type = "docker"

[image]
name = "ghcr.io/seerr-team/seerr"
tag = "v3.2.0"

[settings]
init = true
default_movie_quality_profile = "HD - 720p/1080p"

[ports]
published = ["5055:5055"]

[volumes]
mounts = ["${CONFIG_PATH}/seerr:/app/config"]

[environment]
API_KEY = "${SEERR_API_KEY}"

[ui]
enabled = true
port = 5056
path = "/"
name = "Seerr"
description = "Request management (no-login LAN/Tailscale endpoint)"
