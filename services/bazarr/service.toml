name = "bazarr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime", "sonarr", "radarr"]
optional = []

[runtime]
requirements = ["compose-service", "media-storage"]
services = ["bazarr"]

[container]
container_type = "docker"

[image]
name = "lscr.io/linuxserver/bazarr"
tag = "latest"

[ports]
published = ["6767:6767"]

[volumes]
mounts = ["${STORAGE_PATH}:/data", "${CONFIG_PATH}/bazarr:/config"]

[ui]
enabled = true
port = 6767
path = "/"
name = "Bazarr"
description = "Subtitle automation"
