name = "autobrr"
version = "1.0.0"
scope = "resource"
targets = ["vm"]

[dependencies]
requires = ["container-runtime"]
optional = ["qbittorrent-vpn"]

[runtime]
requirements = ["compose-service"]
services = ["autobrr"]

[scripts]
provision = "scripts/bootstrap-autobrr.sh"

[container]
container_type = "docker"

[image]
name = "ghcr.io/autobrr/autobrr"
tag = "latest"

[volumes]
mounts = ["${CONFIG_PATH}/autobrr:/config"]

[environment]
AUTOBRR__HOST = "0.0.0.0"
AUTOBRR__PORT = "7474"
AUTOBRR__BASE_URL = "/autobrr/"
AUTOBRR__BASE_URL_MODE_LEGACY = "false"
AUTOBRR__SESSION_SECRET = "${AUTOBRR_SESSION_SECRET}"
AUTOBRR__CUSTOM_DEFINITIONS = "${AUTOBRR_CUSTOM_DEFINITIONS}"
AUTOBRR__LOG_LEVEL = "info"

[ui]
enabled = true
port = 7474
path = "/autobrr/"
name = "Autobrr"
description = "Automated torrent/usenet snatching"
