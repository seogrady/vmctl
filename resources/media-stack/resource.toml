name = "media-stack"
kind = "vm"
image = "ubuntu_24_cloud_image"
role = "media_stack"
vmid = 210
cores = 8
memory = 12288
disk_gb = 200
disk_interface = "scsi0"
scsi_hardware = "virtio-scsi-single"
iothread = false
description = "Media stack VM managed by vmctl"
depends_on = ["tailscale-gateway"]

[network]
mode = "dhcp"

[cloud_init]
user = "ubuntu"
ssh_key_file = "${env.DEFAULT_SSH_KEY_FILE}"

[provision]
user = "ubuntu"
private_key_file = "${env.DEFAULT_SSH_PRIVATE_KEY_FILE}"

[env]
JELLYFIN_ADMIN_USER = "admin"
JELLYFIN_ADMIN_PASSWORD = ""
WIREGUARD_PRIVATE_KEY = ""
WIREGUARD_ADDRESSES = ""
VPN_SERVER_CITIES = ""

[features.docker]
enabled = true

[features.tailscale]
enabled = true
mode = "client"
auth_key = "${env.TAILSCALE_AUTH_KEY}"
tags = ["tag:homelab"]

[features.media_services]
enabled = true
minimal = true
services = ["caddy", "gluetun", "jellio-shim", "jellyfin", "meilisearch", "jellysearch", "recyclarr", "sabnzbd", "autobrr", "sonarr", "radarr", "prowlarr", "flaresolverr", "qbittorrent-vpn", "seerr", "bazarr", "jellystat-db", "jellystat"]
jellyfin_url = "http://media-stack:8096"
jellyfin_admin_user = "${env.JELLYFIN_ADMIN_USER}"
jellyfin_admin_password = "${env.JELLYFIN_ADMIN_PASSWORD}"
ui_homepage_enabled = true
ui_homepage_title = "Media Stack"

[features.intel_igpu]
enabled = true
mapping = "intel-igpu"
pci_device = "00:02.0"

[features.media_services.download_routing]
prefer = "usenet"
fallback = "torrent"
require_client = true

[features.media_services.playback]
enable_pre_normalization = true
remove_original_after_normalization = true
normalize_video_codec = "libx265"
normalize_preset = "slow"
normalize_crf = 19
normalize_audio_codec = "aac"
normalize_audio_bitrate = "384k"
normalize_max_width = 0
tone_map_enabled = true
tone_map_algorithm = "hable"
tone_map_desat = "0.0"

[features.media_services.exposure]
tailscale_https_enabled = true
tailscale_https_target = "http://127.0.0.1:80"

[features.storage]
path = "/data"

[features.vpn]
enabled = true
provider = "mullvad"
type = "wireguard"
wireguard_private_key = "${env.WIREGUARD_PRIVATE_KEY}"
wireguard_addresses = "${env.WIREGUARD_ADDRESSES}"
server_cities = "${env.VPN_SERVER_CITIES}"

[defaults]
requires = ["docker"]

[render]
templates = ["docker-compose.media.hbs", "media.env.hbs", "media-index.html.hbs", "tailscale-setup.sh.hbs"]

[hooks]
bootstrap = [
  "scripts/bootstrap-node.sh",
  "scripts/bootstrap-tailscale.sh",
  "scripts/bootstrap-media.sh",
  "scripts/bootstrap-arr.sh",
  "scripts/bootstrap-download-unpack.sh",
]
pre_normalize = "hooks/pre-normalize.sh"
cleanup = "hooks/cleanup.sh"
