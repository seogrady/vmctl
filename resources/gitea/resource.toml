name = "gitea"
kind = "lxc"
image = "debian_12_lxc"
role = "gitea"
vmid = 212
rootfs_gb = 16
memory = 2048
cores = 2
description = "Gitea source control service (LXC preferred, VM-capable hooks)"

[network]
mode = "dhcp"

[provision]
user = "root"
private_key_file = "${env.DEFAULT_SSH_PRIVATE_KEY_FILE}"
retries = 20
retry_delay_seconds = 15

[env]
GITEA_ADMIN_USER = "admin"
GITEA_ADMIN_PASSWORD = "changeme"
GITEA_ADMIN_EMAIL = "admin@gitea.local"
GITEA_DOMAIN = "gitea"
GITEA_HTTP_PORT = "3000"
GITEA_SSH_PORT = "2222"
GITEA_BASE_URL = ""
GITEA_SSH_HOST = ""
GITEA_TAILSCALE_HTTPS_ENABLED = "true"
GITEA_TAILSCALE_HTTPS_TARGET = ""

[features.lxc]
nesting = true

[features.tailscale]
enabled = true
mode = "client"
auth_key = "${env.TAILSCALE_AUTH_KEY}"
tags = ["tag:homelab"]

[features.gitea]
enabled = true
admin_user = "${env.GITEA_ADMIN_USER}"
admin_password = "${env.GITEA_ADMIN_PASSWORD}"
admin_email = "${env.GITEA_ADMIN_EMAIL}"
domain = "${env.GITEA_DOMAIN}"
http_port = "${env.GITEA_HTTP_PORT}"
ssh_port = "${env.GITEA_SSH_PORT}"
repo_root = "/var/lib/gitea/repositories"
data_root = "/var/lib/gitea"
admin_ssh_key_source = "/root/.ssh/authorized_keys"
base_url = "${env.GITEA_BASE_URL}"
ssh_host = "${env.GITEA_SSH_HOST}"
tailscale_https_enabled = "${env.GITEA_TAILSCALE_HTTPS_ENABLED}"
tailscale_https_target = "${env.GITEA_TAILSCALE_HTTPS_TARGET}"

[features.gitea_bundle]
services = ["gitea"]

[render]
templates = ["tailscale-setup.sh.hbs", "gitea.env.hbs"]

[hooks]
bootstrap = [
    "scripts/bootstrap-node.sh",
    "scripts/bootstrap-tailscale.sh",
    "scripts/bootstrap-gitea.sh"
]
validate = ["scripts/validate-gitea.sh"]
